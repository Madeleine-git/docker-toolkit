services:
  backend:
    build: .
    container_name: toolkit-backend
    expose:
      - "8000"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_VERSION=${APP_VERSION}
    volumes:
      - toolkit-data:/data
    networks:
      - toolkit-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: toolkit-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - toolkit-net

  proxy:
    image: nginx:alpine
    container_name: toolkit-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - toolkit-net
    depends_on:
      - backend

volumes:
  toolkit-data:
  redis-data:

networks:
  toolkit-net:
    driver: bridge
