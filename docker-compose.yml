services:
  backend:
    build: .
    container_name: toolkit-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_VERSION=${APP_VERSION}
    volumes:
      - toolkit-data:/data
    networks:
      - toolkit-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: toolkit-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - toolkit-net

volumes:
  toolkit-data:
  redis-data:

networks:
  toolkit-net:
    driver: bridge
